name: Release Docker Images and Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  verify-main-source:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify ref belongs to main
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            exit 0
          fi
          if git branch -r --contains "${GITHUB_SHA}" | grep -q 'origin/main$'; then
            exit 0
          fi
          echo "::error::Release workflow only runs for refs contained in origin/main."
          exit 1

  docker-build:
    needs: verify-main-source
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=sha
            type=raw,value=latest

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-release-binaries:
    needs: verify-main-source
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            make_target: release-linux-amd64
            artifact_name: llm-proxy-lite-linux-amd64
            artifact_path: dist/linux-amd64/llm-proxy-lite-linux-amd64
          - os: ubuntu-24.04-arm
            make_target: release-linux-arm64
            artifact_name: llm-proxy-lite-linux-arm64
            artifact_path: dist/linux-arm64/llm-proxy-lite-linux-arm64
          - os: macos-14
            make_target: release-darwin-arm64
            artifact_name: llm-proxy-lite-darwin-arm64
            artifact_path: dist/darwin-arm64/llm-proxy-lite-darwin-arm64
          - os: windows-latest
            make_target: release-windows-amd64
            artifact_name: llm-proxy-lite-win32-amd64.exe
            artifact_path: dist/win32-amd64/llm-proxy-lite-win32-amd64.exe
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true

      - name: Build binary
        run: make ${{ matrix.make_target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - docker-build
      - build-release-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download linux amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: llm-proxy-lite-linux-amd64
          path: release-assets/llm-proxy-lite-linux-amd64

      - name: Download linux arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: llm-proxy-lite-linux-arm64
          path: release-assets/llm-proxy-lite-linux-arm64

      - name: Download darwin arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: llm-proxy-lite-darwin-arm64
          path: release-assets/llm-proxy-lite-darwin-arm64

      - name: Download windows amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: llm-proxy-lite-win32-amd64.exe
          path: release-assets/llm-proxy-lite-win32-amd64.exe

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name='${{ github.ref_name }}' \
            --jq '.body' > release-notes.md
          cat >> release-notes.md <<'EOF'

          ## macOS 运行注意事项

          macOS 二进制已做 ad-hoc 签名；如仍被系统拦截，请执行：

          ```bash
          xattr -cr ./llm-proxy-lite-darwin-arm64
          chmod +x ./llm-proxy-lite-darwin-arm64
          ./llm-proxy-lite-darwin-arm64
          ```

          若提示来源受限，可在“系统设置 → 隐私与安全性”中允许后再次运行。
          EOF

      - name: Create GitHub Release with assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/llm-proxy-lite-linux-amd64/llm-proxy-lite-linux-amd64
            release-assets/llm-proxy-lite-linux-arm64/llm-proxy-lite-linux-arm64
            release-assets/llm-proxy-lite-darwin-arm64/llm-proxy-lite-darwin-arm64
            release-assets/llm-proxy-lite-win32-amd64.exe/llm-proxy-lite-win32-amd64.exe
          body_path: release-notes.md
