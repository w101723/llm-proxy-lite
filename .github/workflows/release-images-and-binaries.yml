name: Release Docker Images and Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=sha
            type=raw,value=latest

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-release-binaries:
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            make_target: release-linux-amd64
            artifact_name: llm-proxy-lite-linux-x64
            artifact_path: dist/linux-x64/llm-proxy-lite-linux-x64
          - os: ubuntu-24.04-arm
            make_target: release-linux-arm64
            artifact_name: llm-proxy-lite-linux-arm64
            artifact_path: dist/linux-arm64/llm-proxy-lite-linux-arm64
          - os: macos-14
            make_target: release-darwin-arm64
            artifact_name: llm-proxy-lite-darwin-arm64
            artifact_path: dist/darwin-arm64/llm-proxy-lite-darwin-arm64
          - os: windows-latest
            make_target: release-windows-amd64
            artifact_name: llm-proxy-lite-win32-x64.exe
            artifact_path: dist/win32-x64/llm-proxy-lite-win32-x64.exe
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build binary
        run: make ${{ matrix.make_target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - docker-build
      - build-release-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download linux amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: llm-proxy-lite-linux-x64
          path: release-assets/llm-proxy-lite-linux-x64

      - name: Download linux arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: llm-proxy-lite-linux-arm64
          path: release-assets/llm-proxy-lite-linux-arm64

      - name: Download darwin arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: llm-proxy-lite-darwin-arm64
          path: release-assets/llm-proxy-lite-darwin-arm64

      - name: Download windows amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: llm-proxy-lite-win32-x64.exe
          path: release-assets/llm-proxy-lite-win32-x64.exe

      - name: Create GitHub Release with assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/llm-proxy-lite-linux-x64/llm-proxy-lite-linux-x64
            release-assets/llm-proxy-lite-linux-arm64/llm-proxy-lite-linux-arm64
            release-assets/llm-proxy-lite-darwin-arm64/llm-proxy-lite-darwin-arm64
            release-assets/llm-proxy-lite-win32-x64.exe/llm-proxy-lite-win32-x64.exe
          body: |
            ## Build Targets (from Makefile)

            Included release binaries are produced from these targets:
            - `make release-linux-amd64`
            - `make release-linux-arm64`
            - `make release-darwin-arm64`
            - `make release-windows-amd64`

            Additional Makefile targets:
            - `make build-bin`
            - `make release-bins`
            - `make clean`
            - `make release-all`

            ## Docker Image

            Multi-arch image built from current `Dockerfile`:
            - `linux/amd64`
            - `linux/arm64`

            Published to:
            - `ghcr.io/${{ github.repository }}:${{ github.ref_name }}`
            - `ghcr.io/${{ github.repository }}:sha-<commit>`

            ## macOS 运行注意事项

            macOS 二进制已做 ad-hoc 签名；如仍被系统拦截，请执行：

            ```bash
            xattr -cr ./llm-proxy-lite-darwin-arm64
            chmod +x ./llm-proxy-lite-darwin-arm64
            ./llm-proxy-lite-darwin-arm64
            ```

            若提示来源受限，可在“系统设置 → 隐私与安全性”中允许后再次运行。
